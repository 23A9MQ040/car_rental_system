apiVersion: apps/v1
kind: Deployment
metadata:
  name: car-rental-app
  namespace: car-rental
  labels:
    app: car-rental-app
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: car-rental-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: car-rental-app
        version: v1
    spec:
      serviceAccountName: car-rental-sa
      containers:
      - name: car-rental-app
        image: car-rental:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: car-rental-config
              key: database.url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: car-rental-secrets
              key: database.username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: car-rental-secrets
              key: database.password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: car-rental-secrets
              key: jwt.secret
        - name: JWT_EXPIRATION
          valueFrom:
            configMapKeyRef:
              name: car-rental-config
              key: jwt.expiration
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          valueFrom:
            configMapKeyRef:
              name: car-rental-config
              key: jpa.ddl.auto
        - name: LOGGING_LEVEL_COM_CARRENTALS
          valueFrom:
            configMapKeyRef:
              name: car-rental-config
              key: logging.level

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /api/cars
            port: http
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /api/cars
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        volumeMounts:
        - name: temp
          mountPath: /tmp

      volumes:
      - name: temp
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - car-rental-app
              topologyKey: kubernetes.io/hostname

      securityContext:
        fsGroup: 1000
