<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AP Car Rentals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">AP CARS</div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="browse-cars.html">Browse Cars</a></li>
                <li><a href="login.html" class="active">Login</a></li>
                <li><a href="register.html" class="btn-secondary">Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Form Section -->
    <section class="form-section">
        <div class="form-container">
            <h2>Login to Your Account</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn-primary">Login</button>
                <p class="form-link">Don't have an account? <a href="register.html">Register here</a></p>
            </form>
            <div id="loginMessage" class="message"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 AP Car Rentals. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
