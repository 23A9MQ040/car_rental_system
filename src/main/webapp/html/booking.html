<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - AP Car Rentals</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">AP Car Rentals</div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="browse-cars.html">Browse Cars</a></li>
                <li><a href="user-dashboard.html">Dashboard</a></li>
                <li>
                    <button id="logoutBtn4" onclick="logout()" class="btn-logout">Logout</button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Booking Form Section -->
    <section class="booking-section">
        <div class="container">
            <h2>Complete Your Booking</h2>
            <div class="booking-container">
                <!-- Car summary -->
                <div id="carSummary" class="car-summary">
                    <!-- Car details will be loaded here -->
                </div>

                <!-- Booking form -->
                <form id="bookingForm" onsubmit="handleBooking(event)">
                    <div class="form-group">
                        <label for="startDate">Start Date:</label>
                        <input type="date" id="startDate" name="startDate" required>
                    </div>

                    <div class="form-group">
                        <label for="endDate">End Date:</label>
                        <input type="date" id="endDate" name="endDate" required>
                    </div>

                    <div class="form-group">
                        <label for="pickupLocation">Pickup Location:</label>
                        <input type="text" id="pickupLocation" name="pickupLocation" required>
                    </div>

                    <div class="form-group">
                        <label for="dropoffLocation">Dropoff Location:</label>
                        <input type="text" id="dropoffLocation" name="dropoffLocation" required>
                    </div>

                    <div class="form-group">
                        <label for="promoCode">Promo Code (Optional):</label>
                        <input type="text" id="promoCode" name="promoCode">
                        <button type="button" onclick="applyPromoCode()" class="btn-secondary">Apply</button>
                    </div>

                    <!-- Price Summary -->
                    <div class="price-summary">
                        <div class="summary-row">
                            <span>Daily Rate:</span>
                            <span id="dailyRate">$0</span>
                        </div>
                        <div class="summary-row">
                            <span>Number of Days:</span>
                            <span id="numDays">0</span>
                        </div>
                        <div class="summary-row">
                            <span>Base Price:</span>
                            <span id="basePrice">$0</span>
                        </div>
                        <div class="summary-row" id="discountRow" style="display: none;">
                            <span>Discount:</span>
                            <span id="discount">-$0</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total Price:</span>
                            <span id="totalPrice">$0</span>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Confirm Booking</button>
                </form>

                <div id="bookingMessage" class="message"></div>
            </div>

            <button onclick="window.history.back()" class="btn-secondary">Back to Car Details</button>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 AP Car Rentals. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is logged in
            if (!getCurrentUser()) {
                window.location.href = 'login.html';
            }
            loadBookingDetails();
        });
    </script>
</body>
</html>
