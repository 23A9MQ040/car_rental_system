<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AP Car Rentals</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">AP Car Rentals</div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="browse-cars.html">Browse Cars</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html" class="active btn-secondary">Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- Registration Form Section -->
    <section class="form-section">
        <div class="form-container">
            <h2>Create New Account</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email Address:</label>
                    <input type="email" id="regEmail" name="regEmail" required>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password:</label>
                    <input type="password" id="regPassword" name="regPassword" required>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number:</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" required>
                </div>

                <div class="form-group">
                    <label for="licenseNumber">License Number:</label>
                    <input type="text" id="licenseNumber" name="licenseNumber" required>
                </div>

                <button type="submit" class="btn-primary">Register</button>
                <p class="form-link">Already have an account? <a href="login.html">Login here</a></p>
            </form>
            <div id="registerMessage" class="message"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 AP Car Rentals. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
